defaults:
- ../ppo_trainer@models.shared_model.ppo_trainer_config: eval
- _self_

workflow_type: external_mas
specialization: shared
lora_rank: 0
lora_alpha: 16

resource:
  nnodes: 1
  n_gpus_per_node: 8
  trust_remote_code: true

env:
  name: search_env
  dataset: drmas_search
  benchmark: drmas_search_nosearch
  multi_modal: false
  batched_init: true

agent_policy_configs:
  agent_configs:
    agent_0:
      name: verifier
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.15  # Reduced from 0.2 for 4B model
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_1:
      name: searcher
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.4  # Reduced from 0.6 for 4B model
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_2:
      name: answerer
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.3  # Reduced from 0.4 for 4B model
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0

base_models:
  shared_policy:
    path: /data1/lll/models/Qwen3-4B-Instruct-2507
    name: shared_model

training:
  rollout_source: mate
  device: cuda
  total_training_steps: 100
  project_name: orchrl
  experiment_name: search_mas_roleshare_100step_4b_8gpu_lowtemp
  logger:
  - console
  model_checkpoints_dir: checkpoints/search_mas_roleshare_100step_4b_8gpu_lowtemp
  ray_wait_register_center_timeout: 300
  train_batch_size: 4  # Reduced from 8 to reduce memory
  train_sample_num: 8  # Reduced from 16 to reduce memory
  validate_sample_num: 4
  sample_temperature: 0.4  # Reduced from 0.6 for 4B model
  val_freq: 20
  max_prompt_length: 4096
  max_response_length: 4096
  lora_rank: ${lora_rank}
  lora_alpha: ${lora_alpha}
  mate:
    roles: [verifier, searcher, answerer]
    role_policy_mapping:
      verifier: shared_model
      searcher: shared_model
      answerer: shared_model
    batch_size: ${training.train_batch_size}
    n_samples_per_prompt: ${training.train_sample_num}
    max_concurrent_episodes: 2  # Reduced from 4 to reduce memory
    timeout: 120
    backend_timeout: 120
    credit_assignment: all_turns
    mas_work_dir: examples/mas_app/search
    mas_command_template: python scripts/run_search_mas.py --config {config_path} --question {prompt}
    config_template_path: /data1/lll/workspace/multi_agent_rl/OrchRL/examples/mas_app/search/configs/search_mas_example.yaml
    prompt_loader:
      source_type: parquet
      path: /data1/lll/workspace/multi_agent_rl/DrMAS/mas_app/search/data/drmas_search_mas/train.parquet
      prompt_keys: [question, prompt, query, problem, input]
      expected_keys: [expected_answer, answer, expected_answers, gold_answer, golden_answers, target, label]
    reward:
      provider: orchrl.reward.search.external_mas_reward:compute_reward
    archive_logs: true
    archive_root: null

models:
  shared_model:
    path: ${base_models.shared_policy.path}
    name: ${base_models.shared_policy.name}
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.shared_policy.path}
          enable_gradient_checkpointing: true
          enable_activation_offload: true
          use_remove_padding: true
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: 8
          max_num_batched_tokens: 4096  # Reduced from 6144 to reduce memory
          max_num_seqs: 16  # Reduced from 128 to reduce memory
          gpu_memory_utilization: 0.4  # Reduced from 0.3 to reduce memory
          n: 1  # Number of rollouts per prompt (default, must be >= 1)
        actor:
          ppo_mini_batch_size: 8  # Normalized: 8*1/8=1
          ppo_micro_batch_size: 8  # Must be >= 8 GPUs (8//8=1 per GPU)
          ppo_micro_batch_size_per_gpu: null  # Auto-calculated
          use_dynamic_bsz: true
          ppo_max_token_len_per_gpu: 4096  # Must be >= max_prompt + max_response (3072+3072=6144)
          use_torch_compile: false
          fsdp_config:
            param_offload: true  # Enable to reduce memory
            optimizer_offload: false
            offload_policy: true
        ref:
          log_prob_micro_batch_size: 8  # Must be >= 8 GPUs (8//8=1 per GPU)
          log_prob_micro_batch_size_per_gpu: null  # Auto-calculated
          log_prob_use_dynamic_bsz: true
          log_prob_max_token_len_per_gpu: 4096  # Must be >= max_prompt + max_response (3072+3072=6144)
          enable_activation_offload: true
          use_torch_compile: false
          fsdp_config:
            param_offload: true  # Enable to reduce memory
            reshard_after_forward: true
            offload_policy: true
        trainer:
          n_gpus_per_node: 8
          n_training_gpus_per_node: 8
