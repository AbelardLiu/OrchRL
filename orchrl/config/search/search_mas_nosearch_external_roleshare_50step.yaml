defaults:
- ../ppo_trainer@models.shared_model.ppo_trainer_config: eval
- _self_

workflow_type: external_mas
specialization: shared
lora_rank: 0
lora_alpha: 16

resource:
  nnodes: 1
  n_gpus_per_node: 2
  trust_remote_code: true

env:
  name: search_env
  dataset: drmas_search
  benchmark: drmas_search_nosearch
  multi_modal: false
  batched_init: true

agent_policy_configs:
  agent_configs:
    agent_0:
      name: verifier
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.2
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_1:
      name: searcher
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_2:
      name: answerer
      policy_name: shared_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.4
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0

base_models:
  shared_policy:
    path: /data1/lll/models/Qwen3-0.6B
    name: shared_model

training:
  rollout_source: mate
  device: cuda
  total_training_steps: 50
  project_name: orchrl
  experiment_name: search_mas_roleshare_50step
  logger:
  - console
  model_checkpoints_dir: checkpoints/search_mas_roleshare_50step
  ray_wait_register_center_timeout: 300
  train_batch_size: 8
  train_sample_num: 16
  validate_sample_num: 4
  sample_temperature: 0.6
  val_freq: 10
  max_prompt_length: 3072
  max_response_length: 3072
  lora_rank: ${lora_rank}
  lora_alpha: ${lora_alpha}
  mate:
    roles: [verifier, searcher, answerer]
    role_policy_mapping:
      verifier: shared_model
      searcher: shared_model
      answerer: shared_model
    batch_size: ${training.train_batch_size}
    n_samples_per_prompt: ${training.train_sample_num}
    max_concurrent_episodes: 4
    timeout: 120
    backend_timeout: 120
    credit_assignment: all_turns
    mas_work_dir: examples/mas_app/search
    mas_command_template: python scripts/run_search_mas.py --config {config_path} --question {prompt}
    config_template_path: /data1/lll/workspace/multi_agent_rl/OrchRL/examples/mas_app/search/configs/search_mas_example.yaml
    prompt_loader:
      source_type: parquet
      path: /data1/lll/workspace/multi_agent_rl/DrMAS/mas_app/search/data/drmas_search_mas/test_sampled.parquet
      prompt_keys: [question, prompt, query, problem, input]
      expected_keys: [expected_answer, answer, expected_answers, gold_answer, golden_answers, target, label]
    reward:
      provider: orchrl.reward.search.external_mas_reward:compute_reward
    archive_logs: true
    archive_root: null

models:
  shared_model:
    path: ${base_models.shared_policy.path}
    name: ${base_models.shared_policy.name}
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.shared_policy.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: 2
          max_num_batched_tokens: 6144
          max_num_seqs: 128
          gpu_memory_utilization: 0.25  # Lower utilization for co-located FSDP training and vLLM inference
        trainer:
          n_gpus_per_node: 2
          n_training_gpus_per_node: 2
